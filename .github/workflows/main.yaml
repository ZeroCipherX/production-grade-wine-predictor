name: Wine Predictor CD

on:
  push:
    branches:
      - main  

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t zerocipherx/wine-predictor:latest .
          docker push zerocipherx/wine-predictor:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Use sudo for all docker commands to avoid permission issues
            sudo docker pull zerocipherx/wine-predictor:latest
            sudo docker stop wine-prod || true
            sudo docker rm wine-prod || true
            
            # Pointing to the .env file in your project folder
            sudo docker run -d -p 80:8080 --name wine-prod --env-file ~/production-grade-wine-predictor/.env zerocipherx/wine-predictor:latest