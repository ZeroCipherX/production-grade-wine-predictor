<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #722f37;
            --bg: #0f0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #f8f1f1;
            --accent: #e2b04a;
        }

        body {
            background: #0f0a0a;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .result-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .label { 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.75rem; 
            margin-bottom: 25px;
            display: block;
        }

        /* FIXED CIRCLE */
        .score-circle {
            width: 180px;
            height: 180px;
            border: 2px solid rgba(226, 176, 74, 0.3);
            outline: 6px solid rgba(226, 176, 74, 0.1);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            background: rgba(226, 176, 74, 0.03);
            box-shadow: inset 0 0 20px rgba(226, 176, 74, 0.05);
        }

        .score-num {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
        }

        .score-total {
            font-size: 0.9rem;
            opacity: 0.5;
            font-weight: 600;
        }

        h2 { font-size: 1.8rem; margin: 10px 0 30px; }

        /* AI SECTION */
        .ai-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        .ai-btn {
            background: var(--accent);
            color: #000;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            font-family: inherit;
        }

        .ai-btn:hover { transform: scale(1.02); background: #f5c86e; }
        .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #aiContent {
            margin-top: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            color: #bbb;
            display: none;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .back-link { display: inline-block; margin-top: 30px; color: #666; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="result-card">
    <span class="label">Analysis Result</span>
    
    <div class="score-circle">
        <!-- We use ID "rawScore" to hold the [5.36...] text temporarily -->
        <div class="score-num" id="displayScore">{{ prediction }}</div>
        <div class="score-total">SCORE / 10</div>
    </div>

    <h2 id="verdict">Evaluating...</h2>

    <div class="ai-section">
        <button class="ai-btn" id="aiBtn">
            <span>✦</span> Consult AI Sommelier
        </button>
        <div id="aiContent"></div>
    </div>

    <a href="/" class="back-link">← Return to Laboratory</a>
</div>

<script>
    // 1. CLEAN THE DATA (The "Fluff" Fix)
    const scoreElement = document.getElementById('displayScore');
    let rawText = scoreElement.innerText;
    
    // Remove brackets [] and convert to a clean number
    let cleanNumber = parseFloat(rawText.replace(/[\[\]]/g, ''));
    
    // Round to 1 decimal place (e.g. 5.4)
    let roundedScore = cleanNumber.toFixed(1);
    
    // Update the UI with the clean number
    scoreElement.innerText = roundedScore;

    // 2. UPDATE COLOR & VERDICT
    const verdict = document.getElementById('verdict');
    if(cleanNumber >= 7) { 
        verdict.innerText = "Exceptional Vintage"; 
        verdict.style.color = "#4ade80";
        scoreElement.style.color = "#4ade80";
    } else if(cleanNumber >= 5) { 
        verdict.innerText = "Solid Table Wine"; 
        verdict.style.color = "#facc15";
        scoreElement.style.color = "#facc15";
    } else { 
        verdict.innerText = "Below Standard"; 
        verdict.style.color = "#f87171";
        scoreElement.style.color = "#f87171";
    }

    // 3. AI BUTTON LOGIC
    async function getAISommelier() {
    const btn = document.getElementById('aiBtn');
    const content = document.getElementById('aiContent');

    btn.disabled = true;
    btn.innerText = 'Consulting the Cellar...';
    content.style.display = 'block';
    content.innerText = 'Analyzing chemical composition...';

    const prompt = `A wine has a quality score of ${roundedScore}/10. ...`;

    try {
        const res = await fetch("/ai_sommelier", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ score: roundedScore })
        });
        const data = await res.json();
        content.innerText = data?.choices?.[0]?.message?.content ?? "No inferences available.";
    } catch (err) {
        content.innerText = "The AI Sommelier is away. Your wine score is " + roundedScore + ".";
    } finally {
        btn.innerText = "Analysis Complete";
        btn.disabled = false;
    }
}
    document.getElementById('aiBtn').addEventListener('click', getAISommelier);
</script>

</body>
</html>
